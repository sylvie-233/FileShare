<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>е±ЂеџџзЅ‘ж–‡д»¶е…±дє«</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .upload-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .share-section {
            background: white;
            border-radius: 16px;
            padding: 25px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .share-section h3 {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 15px;
        }

        .share-link-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9ff;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 12px 15px;
        }

        .share-link {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            color: #333;
            word-break: break-all;
            background: transparent;
            border: none;
            outline: none;
        }

        .btn-copy {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-copy:active {
            transform: translateY(0);
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .drop-zone:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .drop-zone.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .drop-zone-icon {
            font-size: 64px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .drop-zone-text {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 10px;
        }

        .drop-zone-hint {
            color: #666;
            font-size: 0.9em;
        }

        .file-input {
            display: none;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            margin-top: 8px;
            color: #666;
            font-size: 0.9em;
        }

        .files-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .files-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .btn-clear {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-clear:hover {
            background: #ee5a5a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        .btn-clear:active {
            transform: translateY(0);
        }

        .files-list {
            display: grid;
            gap: 15px;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .file-item:hover {
            background: #f0f2ff;
            transform: translateX(5px);
        }

        .file-icon {
            font-size: 36px;
            margin-right: 15px;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            word-break: break-all;
        }

        .file-meta {
            color: #666;
            font-size: 0.85em;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .btn-download {
            background: #667eea;
            color: white;
        }

        .btn-download:hover {
            background: #5568d3;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:hover {
            background: #ee5a5a;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
        }

        .notification.success {
            background: #4CAF50;
        }

        .notification.error {
            background: #f44336;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.8em;
                margin-bottom: 20px;
            }

            .upload-section,
            .files-section {
                padding: 20px 15px;
                border-radius: 12px;
            }

            .share-section {
                padding: 20px 15px;
                border-radius: 12px;
            }

            .share-section h3 {
                font-size: 1.1em;
                margin-bottom: 12px;
            }

            .share-link-container {
                flex-direction: column;
                gap: 12px;
                padding: 15px;
            }

            .share-link {
                font-size: 0.9em;
                text-align: left;
                padding: 10px;
                background: white;
                border-radius: 6px;
            }

            .btn-copy {
                width: 100%;
                padding: 14px;
                font-size: 1em;
            }

            .drop-zone {
                padding: 40px 15px;
            }

            .drop-zone-icon {
                font-size: 48px;
                margin-bottom: 15px;
            }

            .drop-zone-text {
                font-size: 1em;
            }

            .drop-zone-hint {
                font-size: 0.85em;
            }

            .files-section h2 {
                font-size: 1.4em;
                margin-bottom: 15px;
            }

            .files-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .btn-clear {
                width: 100%;
                padding: 12px;
                font-size: 0.95em;
            }

            .files-list {
                gap: 12px;
            }

            .file-item {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px;
                gap: 12px;
            }

            .file-item:hover {
                transform: none;
            }

            .file-icon {
                font-size: 32px;
                margin-right: 0;
                margin-bottom: 5px;
            }

            .file-info {
                width: 100%;
                margin-bottom: 5px;
            }

            .file-name {
                font-size: 0.95em;
                line-height: 1.4;
            }

            .file-meta {
                font-size: 0.8em;
            }

            .file-actions {
                width: 100%;
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .btn {
                flex: 1;
                min-width: calc(50% - 5px);
                padding: 12px 16px;
                font-size: 0.95em;
            }

            .empty-state {
                padding: 40px 20px;
            }

            .empty-state-icon {
                font-size: 48px;
            }

            .notification {
                left: 10px;
                right: 10px;
                top: 10px;
                padding: 12px 20px;
                font-size: 0.9em;
            }

            @keyframes slideIn {
                from {
                    transform: translateY(-100px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5em;
            }

            .upload-section,
            .files-section,
            .share-section {
                padding: 15px 12px;
            }

            .share-section h3 {
                font-size: 1em;
            }

            .share-link-container {
                padding: 12px;
            }

            .share-link {
                font-size: 0.85em;
                padding: 8px;
            }

            .btn-copy {
                padding: 12px;
                font-size: 0.95em;
            }

            .drop-zone {
                padding: 30px 12px;
            }

            .drop-zone-icon {
                font-size: 40px;
            }

            .file-item {
                padding: 12px;
            }

            .file-icon {
                font-size: 28px;
            }

            .file-name {
                font-size: 0.9em;
            }

            .btn {
                padding: 10px 14px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>рџ“Ѓ е±ЂеџџзЅ‘ж–‡д»¶е…±дє«</h1>
        
        <div class="share-section">
            <h3>рџ”— е€†дє«й“ѕжЋҐ</h3>
            <div class="share-link-container">
                <input type="text" class="share-link" id="shareLink" readonly>
                <button class="btn-copy" onclick="copyShareLink()">е¤Ќе€¶й“ѕжЋҐ</button>
            </div>
        </div>
        
        <div class="upload-section">
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-icon">рџ“¤</div>
                <div class="drop-zone-text">ж‹–ж‹Ѕж–‡д»¶е€°иї™й‡ЊдёЉдј </div>
                <div class="drop-zone-hint">ж€–иЂ…з‚№е‡»йЂ‰ж‹©ж–‡д»¶</div>
                <input type="file" class="file-input" id="fileInput" multiple>
            </div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">дёЉдј дё­...</div>
            </div>
        </div>
        
        <div class="files-section">
            <div class="files-header">
                <h2>рџ“‚ е·ІдёЉдј ж–‡д»¶</h2>
                <button class="btn-clear" onclick="clearAllFiles()">рџ—‘пёЏ жё…з©єе…ЁйѓЁ</button>
            </div>
            <div class="files-list" id="filesList">
                <div class="empty-state">
                    <div class="empty-state-icon">рџ“­</div>
                    <p>жљ‚ж— ж–‡д»¶пјЊиЇ·дёЉдј ж–‡д»¶</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const filesList = document.getElementById('filesList');
        const notification = document.getElementById('notification');
        const shareLink = document.getElementById('shareLink');

        shareLink.value = window.location.href;

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                uploadFiles(files);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (fileInput.files.length > 0) {
                uploadFiles(fileInput.files);
            }
        });

        async function uploadFiles(files) {
            for (const file of files) {
                await uploadFile(file);
            }
            loadFiles();
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            progressText.textContent = `ж­ЈењЁдёЉдј : ${file.name}`;

            try {
                const response = await fetch('/api/v1/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    progressFill.style.width = '100%';
                    progressText.textContent = 'дёЉдј ж€ђеЉџпјЃ';
                    showNotification('ж–‡д»¶дёЉдј ж€ђеЉџпјЃ', 'success');
                } else {
                    throw new Error('дёЉдј е¤±иґҐ');
                }
            } catch (error) {
                showNotification('ж–‡д»¶дёЉдј е¤±иґҐпјЃ', 'error');
                progressText.textContent = 'дёЉдј е¤±иґҐ';
            }

            setTimeout(() => {
                progressContainer.style.display = 'none';
            }, 2000);
        }

        async function loadFiles() {
            try {
                const response = await fetch('/api/v1/files');
                const data = await response.json();
                displayFiles(data.files);
            } catch (error) {
                console.error('еЉ иЅЅж–‡д»¶е€—иЎЁе¤±иґҐ:', error);
            }
        }

        function displayFiles(files) {
            if (files.length === 0) {
                filesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">рџ“­</div>
                        <p>жљ‚ж— ж–‡д»¶пјЊиЇ·дёЉдј ж–‡д»¶</p>
                    </div>
                `;
                return;
            }

            filesList.innerHTML = files.map(file => `
                <div class="file-item">
                    <div class="file-icon">${getFileIcon(file.name)}</div>
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-meta">${formatFileSize(file.size)} В· ${formatDate(file.modified)}</div>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-download" onclick="downloadFile('${file.name}')">дё‹иЅЅ</button>
                        <button class="btn btn-delete" onclick="deleteFile('${file.name}')">е€ й™¤</button>
                    </div>
                </div>
            `).join('');
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': 'рџ“„',
                'doc': 'рџ“ќ', 'docx': 'рџ“ќ',
                'xls': 'рџ“Љ', 'xlsx': 'рџ“Љ',
                'ppt': 'рџ“ЅпёЏ', 'pptx': 'рџ“ЅпёЏ',
                'jpg': 'рџ–јпёЏ', 'jpeg': 'рџ–јпёЏ', 'png': 'рџ–јпёЏ', 'gif': 'рџ–јпёЏ',
                'mp3': 'рџЋµ', 'wav': 'рџЋµ',
                'mp4': 'рџЋ¬', 'avi': 'рџЋ¬', 'mkv': 'рџЋ¬',
                'zip': 'рџ“¦', 'rar': 'рџ“¦', '7z': 'рџ“¦',
                'txt': 'рџ“ѓ',
                'py': 'рџђЌ', 'js': 'рџ“њ', 'html': 'рџЊђ', 'css': 'рџЋЁ'
            };
            return icons[ext] || 'рџ“Ѓ';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp * 1000);
            const now = new Date();
            const diff = now - date;
            
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            if (seconds < 60) {
                return 'е€ље€љ';
            } else if (minutes < 60) {
                return `${minutes}е€†й’џе‰Ќ`;
            } else if (hours < 24) {
                return `${hours}е°Џж—¶е‰Ќ`;
            } else if (days < 7) {
                return `${days}е¤©е‰Ќ`;
            } else {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hour = String(date.getHours()).padStart(2, '0');
                const minute = String(date.getMinutes()).padStart(2, '0');
                return `${year}-${month}-${day} ${hour}:${minute}`;
            }
        }

        function downloadFile(filename) {
            window.location.href = `/api/v1/download/${filename}`;
        }

        async function deleteFile(filename) {
            if (!confirm(`зЎ®е®љи¦Ѓе€ й™¤ "${filename}" еђ—пјџ`)) return;

            try {
                const response = await fetch(`/api/v1/files/${filename}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showNotification('ж–‡д»¶е€ й™¤ж€ђеЉџпјЃ', 'success');
                    loadFiles();
                } else {
                    throw new Error('е€ й™¤е¤±иґҐ');
                }
            } catch (error) {
                showNotification('ж–‡д»¶е€ й™¤е¤±иґҐпјЃ', 'error');
            }
        }

        async function clearAllFiles() {
            const filesList = document.getElementById('filesList');
            const hasFiles = !filesList.querySelector('.empty-state');
            
            if (!hasFiles) {
                showNotification('жІЎжњ‰ж–‡д»¶еЏЇд»Ґжё…з©є', 'error');
                return;
            }

            if (!confirm('зЎ®е®љи¦Ѓжё…з©єж‰Ђжњ‰ж–‡д»¶еђ—пјџж­¤ж“ЌдЅњдёЌеЏЇжЃўе¤ЌпјЃ')) return;

            try {
                const response = await fetch('/api/v1/files', {
                    method: 'DELETE'
                });

                if (response.ok) {
                    const data = await response.json();
                    showNotification(`е·Іжё…з©є ${data.count} дёЄж–‡д»¶пјЃ`, 'success');
                    loadFiles();
                } else {
                    throw new Error('жё…з©єе¤±иґҐ');
                }
            } catch (error) {
                showNotification('жё…з©єж–‡д»¶е¤±иґҐпјЃ', 'error');
            }
        }

        function copyShareLink() {
            shareLink.select();
            shareLink.setSelectionRange(0, 999999);
            
            try {
                navigator.clipboard.writeText(shareLink.value).then(() => {
                    showNotification('й“ѕжЋҐе·Іе¤Ќе€¶е€°е‰ЄиґґжќїпјЃ', 'success');
                }).catch(() => {
                    document.execCommand('copy');
                    showNotification('й“ѕжЋҐе·Іе¤Ќе€¶е€°е‰ЄиґґжќїпјЃ', 'success');
                });
            } catch (err) {
                showNotification('е¤Ќе€¶е¤±иґҐпјЊиЇ·ж‰‹еЉЁе¤Ќе€¶', 'error');
            }
        }

        function showNotification(message, type) {
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';

            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        loadFiles();
    </script>
</body>
</html>
